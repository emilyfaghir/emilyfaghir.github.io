<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Emily Faghir</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>

  <!-- ========== HEADER ========== -->
  <header>
    <nav>
      <a href="index.html">Photography</a>
      <a href="about.html">About Me</a>
    </nav>
    <div class="site-title">
      <a href="index.html">Emily Faghir</a>
    </div>
  </header>

  <!-- ========== MAIN ========== -->
  <main>
    <a href="index.html" class="back-link">Back to Photography</a>
    <p class="project-page-title" id="project-title">Loading...</p>
    <div class="photos-grid" id="photos-grid">
      <!-- Photos generated by JavaScript -->
    </div>
  </main>

  <!-- ========== LIGHTBOX ========== -->
  <div class="lightbox" id="lightbox">
    <span class="lightbox-close" id="lightbox-close">&times;</span>
    <span class="lightbox-prev" id="lightbox-prev">&#8249;</span>
    <img src="" alt="" id="lightbox-img" />
    <span class="lightbox-next" id="lightbox-next">&#8250;</span>
  </div>

  <!-- ========== FOOTER ========== -->
  <footer>
    <p>&copy; 2026 Emily Faghir</p>
  </footer>

  <!-- ========== SCRIPTS ========== -->
  <script src="js/data.js"></script>
  <script>
    // Get project id from URL e.g. project.html?id=madrid
    const params = new URLSearchParams(window.location.search);
    const projectId = params.get('id');
    const project = projects.find(p => p.id === projectId);

    const titleEl = document.getElementById('project-title');
    const grid = document.getElementById('photos-grid');

    if (!project) {
      titleEl.textContent = 'Project not found';
    } else {
      // Set page title
      document.title = `${project.title} — Emily Faghir`;
      titleEl.textContent = `${project.title} — ${project.year}`;

      // Show real photos first
      project.photos.forEach((filename, index) => {
        const item = document.createElement('div');
        item.classList.add('photo-item');

        const img = document.createElement('img');
        img.src = `photos/${project.id}/${filename}`;
        img.alt = `${project.title} photo ${index + 1}`;
        img.loading = 'lazy';

        img.addEventListener('click', () => openLightbox(index));

        item.appendChild(img);
        grid.appendChild(item);
      });

      // Fill remaining slots with placeholders up to photoCount
      const remaining = (project.photoCount || 9) - project.photos.length;
      for (let i = 0; i < remaining; i++) {
        const item = document.createElement('div');
        item.classList.add('photo-item');
        const ph = document.createElement('div');
        ph.classList.add('placeholder');
        ph.textContent = 'Photo coming soon';
        item.appendChild(ph);
        grid.appendChild(item);
      }
    }

    // ========== LIGHTBOX LOGIC ==========
    const lightbox = document.getElementById('lightbox');
    const lightboxImg = document.getElementById('lightbox-img');
    let currentIndex = 0;

    function openLightbox(index) {
      currentIndex = index;
      lightboxImg.src = `photos/${project.id}/${project.photos[currentIndex]}`;
      lightbox.classList.add('open');
      document.body.style.overflow = 'hidden';
    }

    function closeLightbox() {
      lightbox.classList.remove('open');
      document.body.style.overflow = '';
    }

    function showPrev() {
      currentIndex = (currentIndex - 1 + project.photos.length) % project.photos.length;
      lightboxImg.src = `photos/${project.id}/${project.photos[currentIndex]}`;
    }

    function showNext() {
      currentIndex = (currentIndex + 1) % project.photos.length;
      lightboxImg.src = `photos/${project.id}/${project.photos[currentIndex]}`;
    }

    document.getElementById('lightbox-close').addEventListener('click', closeLightbox);
    document.getElementById('lightbox-prev').addEventListener('click', showPrev);
    document.getElementById('lightbox-next').addEventListener('click', showNext);

    // Close on background click
    lightbox.addEventListener('click', (e) => {
      if (e.target === lightbox) closeLightbox();
    });

    // Keyboard navigation
    document.addEventListener('keydown', (e) => {
      if (!lightbox.classList.contains('open')) return;
      if (e.key === 'ArrowLeft') showPrev();
      if (e.key === 'ArrowRight') showNext();
      if (e.key === 'Escape') closeLightbox();
    });
  </script>

</body>
</html>
