<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Emily Faghir</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>

  <!-- ========== HEADER ========== -->
  <header>
    <nav>
      <a href="index.html" class="active">Photography</a>
      <a href="about.html">About Me</a>
    </nav>
    <div class="site-title">
      <a href="index.html">Emily Faghir</a>
    </div>
  </header>

  <!-- ========== MAIN ========== -->
  <main>
    <p class="grid-title">Photography</p>
    <div class="projects-grid" id="projects-grid">
      <!-- Cards are generated by JavaScript from data.js -->
    </div>
  </main>

  <!-- ========== FOOTER ========== -->
  <footer>
    <p>&copy; 2026 Emily Faghir</p>
  </footer>

  <!-- ========== SCRIPTS ========== -->
  <script src="js/data.js"></script>
  <script>
    const grid = document.getElementById('projects-grid');

    projects.forEach(project => {
      const card = document.createElement('a');
      card.href = `project.html?id=${project.id}`;
      card.classList.add('project-card');

      // Check if thumbnail exists; if not, show placeholder
      if (project.thumbnail) {
        const img = document.createElement('img');
        img.src = project.thumbnail;
        img.alt = project.title;
        // If image fails to load, show placeholder instead
        img.onerror = function() {
          this.replaceWith(makePlaceholder());
        };
        card.appendChild(img);
      } else {
        card.appendChild(makePlaceholder());
      }

      // Hover overlay with title + year
      const overlay = document.createElement('div');
      overlay.classList.add('card-overlay');
      overlay.innerHTML = `
        <span class="card-title">${project.title}</span>
        ${project.year ? `<span class="card-year">${project.year}</span>` : ''}
      `;
      card.appendChild(overlay);

      grid.appendChild(card);
    });

    function makePlaceholder() {
      const div = document.createElement('div');
      div.classList.add('placeholder');
      div.textContent = 'Photo coming soon';
      return div;
    }
  </script>

</body>
</html>
